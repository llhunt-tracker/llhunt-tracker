databases:
  - name: llhunt-db
    plan: free
    databaseName: llhunt
    user: llhunt

services:
  - type: web
    name: llhunt-tracker
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx drizzle-kit push
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: llhunt-db
          property: connectionString
